<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<style>
  body{width:300px;font-family:system-ui,"Segoe UI",sans-serif;margin:0;padding:16px;color:#16181D;background:#fff}
  h1{font-size:15px;margin:0 0 4px;display:flex;align-items:center;gap:8px}
  h1 .li{background:#0A66C2;color:#fff;border-radius:5px;padding:1px 5px;font-size:12px}
  p.sub{font-size:12px;color:#5B616E;margin:0 0 14px;line-height:1.5}
  button#go{width:100%;padding:11px;border:none;border-radius:10px;background:#0A66C2;color:#fff;
    font-size:14px;font-weight:600;cursor:pointer}
  button#go:disabled{opacity:.6;cursor:default}
  .field-row{margin-top:14px}
  label{font-size:12px;font-weight:600;color:#5B616E;display:block;margin-bottom:4px}
  input{width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #E6E8EC;border-radius:8px;font-size:13px}
  #log{margin-top:14px;font-size:12px;color:#16181D;background:#F6F7F9;border-radius:8px;padding:10px;
    max-height:160px;overflow:auto;line-height:1.5;white-space:pre-wrap}
  a{color:#0A66C2;font-size:12px}
</style>
</head>
<body>
  <h1><span class="li">in</span> Cosechar LinkedIn</h1>
  <p class="sub">Abre la actividad de tus personas configuradas, recoge sus posts y los manda al servidor para resumirlos.</p>
  <button id="go">Cosechar ahora</button>
  <div class="field-row">
    <label>Servidor local</label>
    <input id="server" placeholder="http://localhost:3002">
  </div>
  <div id="log"></div>
  <p style="margin-top:12px"><a id="openfeed" href="#">Abrir el feed →</a></p>
  <script src="popup.js"></script>
</body>
</html>
